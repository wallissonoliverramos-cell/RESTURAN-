<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuscuz & Tapioca Delivery</title>
    <style>
        :root { --primary: #ea1d2c; --bg: #f7f7f7; --green: #25d366; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding-bottom: 100px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .price { color: #2e7d32; font-weight: bold; }
        #modal-opcionais { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: flex-end; justify-content: center; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 25px 25px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .footer { position: fixed; bottom: 0; background: white; width: 100%; padding: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .btn-modal { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
        #checkout { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; padding: 20px; overflow-y: auto; }
        .input-estilizado { width:100%; padding:14px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px; font-size: 16px; }
    </style>
</head>
<body>

<div id="tela-principal">
    <header><h1>Cuscuz & Tapioca Delivery ☕</h1></header>
    <div class="container">
        <h2 style="margin:10px 0;">Menu</h2>
        <div id="lista-produtos"></div>
    </div>
    <div class="footer">
        <div>Total: <strong id="total-txt">R$ 0,00</strong></div>
        <button style="background:var(--primary); color:white; border:none; padding:12px 20px; border-radius:10px; font-weight:bold;" onclick="abrirCheckout()">Ver Carrinho ➡</button>
    </div>
</div>

<div id="modal-opcionais">
    <div class="modal-content">
        <h3 id="modal-titulo">Personalizar</h3>
        <div id="opcoes-extras" style="margin: 20px 0;">
            <label style="display:block; margin-bottom:10px;"><input type="checkbox" class="extra-item" data-nome="Ovo Frito" data-preco="3.0"> Ovo Frito (+R$3,00)</label>
            <label style="display:block; margin-bottom:10px;"><input type="checkbox" class="extra-item" data-nome="Queijo Coalho" data-preco="4.5"> Queijo Coalho (+R$4,50)</label>
            <textarea id="obs-item" class="input-estilizado" placeholder="Alguma observação?"></textarea>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-modal" style="background:#666;" onclick="fecharModal()">Voltar</button>
            <button class="btn-modal" style="background:var(--green);" onclick="confirmarAdicao()">Adicionar</button>
        </div>
    </div>
</div>

<div id="checkout">
    <button class="btn-modal" style="background:#666; width:100%; margin-bottom:20px;" onclick="fecharCheckout()">⬅ Adicionar mais itens</button>
    <h2>Resumo do Pedido</h2>
    <div id="resumo" style="background:#f9f9f9; padding:15px; border-radius:12px; margin: 15px 0;"></div>
    <input type="text" id="nome-cli" class="input-estilizado" placeholder="Seu Nome">
    <input type="text" id="end-cli" class="input-estilizado" placeholder="Endereço de Entrega">
    <select id="pag-cli" class="input-estilizado">
        <option value="PIX">PIX</option>
        <option value="Dinheiro">Dinheiro</option>
        <option value="Cartão">Cartão</option>
    </select>
    <button class="btn-modal" style="background:var(--green); width: 100%; font-size: 18px;" onclick="enviarWhatsApp()">🚀 Enviar Pedido para Loja</button>
</div>

<script>
    const produtos = [
        { id: 1, nome: "Cuscuz Carne Seca", preco: 18.0 },
        { id: 2, nome: "Cuscuz de Frango", preco: 15.0 },
        { id: 3, nome: "Tapioca de Queijo", preco: 12.0 }
    ];
    let carrinho = []; let itemAtual = null;

    function renderizar() {
        document.getElementById('lista-produtos').innerHTML = produtos.map(p => `
            <div class="item-card" onclick="abrirModal(${p.id})">
                <div><strong>${p.nome}</strong><br><span class="price">R$ ${p.preco.toFixed(2)}</span></div>
                <button style="background:var(--primary); color:white; border:none; width:30px; height:30px; border-radius:50%;">+</button>
            </div>`).join('');
    }

    function abrirModal(id) {
        itemAtual = produtos.find(p => p.id === id);
        document.getElementById('modal-titulo').innerText = itemAtual.nome;
        document.getElementById('modal-opcionais').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-opcionais').style.display = 'none'; }

    function confirmarAdicao() {
        let vExtras = 0; let nExtras = [];
        document.querySelectorAll('.extra-item:checked').forEach(chk => {
            vExtras += parseFloat(chk.dataset.preco);
            nExtras.push(chk.dataset.nome);
        });
        carrinho.push({
            nome: itemAtual.nome,
            total: itemAtual.preco + vExtras,
            detalhes: nExtras.join(', '),
            obs: document.getElementById('obs-item').value
        });
        fecharModal(); atualizarTotal();
    }

    function atualizarTotal() {
        const t = carrinho.reduce((s, i) => s + i.total, 0);
        document.getElementById('total-txt').innerText = `R$ ${t.toFixed(2)}`;
    }

    function abrirCheckout() {
        if(carrinho.length === 0) return alert("Carrinho vazio!");
        document.getElementById('resumo').innerHTML = carrinho.map(i => `<div><strong>${i.nome}</strong> - R$ ${i.total.toFixed(2)}</div>`).join('');
        document.getElementById('checkout').style.display = 'block';
    }

    function fecharCheckout() { document.getElementById('checkout').style.display = 'none'; }

    function enviarWhatsApp() {
        const nome = document.getElementById('nome-cli').value;
        const end = document.getElementById('end-cli').value;
        const pag = document.getElementById('pag-cli').value;
        if(!nome || !end) return alert("Preencha os campos!");

        let m = `*NOVO PEDIDO* 🛒\n\n👤 *Cliente:* ${nome}\n📍 *Endereço:* ${end}\n\n`;
        carrinho.forEach(i => {
            m += `✅ *${i.nome}* - R$ ${i.total.toFixed(2)}\n${i.detalhes ? ' + '+i.detalhes+'\n' : ''}${i.obs ? ' Obs: '+i.obs+'\n' : ''}\n`;
        });
        m += `*Pagamento:* ${pag}\n*TOTAL:* R$ ${carrinho.reduce((s, i) => s + i.total, 0).toFixed(2)}`;

        // O LINK QUE CONECTA QUALQUER WHATSAPP AO SEU NÚMERO
        const meuNumero = "556192015467";
        window.location.href = "https://api.whatsapp.com" + meuNumero + "&text=" + encodeURIComponent(m);
    }
    renderizar();
</script>
</body>
</html>
