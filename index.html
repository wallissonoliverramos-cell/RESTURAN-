<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuscuz & Tapioca Delivery</title>
    <style>
        :root { --primary: #ea1d2c; --bg: #f7f7f7; --green: #25d366; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding-bottom: 100px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        h2 { margin: 20px 0 10px; font-size: 18px; color: #444; border-left: 4px solid var(--primary); padding-left: 10px; }
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .price { color: #2e7d32; font-weight: bold; }
        #modal-opcionais { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: flex-end; justify-content: center; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 25px 25px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .modal-secao { margin-bottom: 15px; }
        .modal-secao h4 { background: #fdf2f2; padding: 8px; color: var(--primary); font-size: 13px; border-radius: 8px; margin-bottom: 8px; text-transform: uppercase; }
        .opcao-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .obs-box { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; margin-top: 10px; min-height: 60px; }
        .footer { position: fixed; bottom: 0; background: white; width: 100%; padding: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .btn-modal { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
        .btn-voltar-modal { background: #666; }
        .btn-confirmar-modal { background: var(--green); }
        #checkout { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; padding: 20px; overflow-y: auto; }
        .input-estilizado { width:100%; padding:14px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px; font-size: 16px; }
        #area-troco { display: none; background: #fffbe6; padding: 15px; border-radius: 12px; border: 1px solid #ffe58f; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="tela-principal">
    <header><h1>Cuscuz & Tapioca Delivery ☕</h1></header>
    <div class="container">
        <h2>🌽 Cuscuz</h2>
        <div id="lista-cuscuz"></div>
        <h2>⚪ Tapiocas</h2>
        <div id="lista-tapioca"></div>
    </div>
    <div class="footer">
        <div>Total: <strong id="total-txt">R$ 0,00</strong></div>
        <button style="background:var(--primary); color:white; border:none; padding:12px 20px; border-radius:10px; font-weight:bold;" onclick="abrirCheckout()">Ver Carrinho ➡</button>
    </div>
</div>

<div id="modal-opcionais">
    <div class="modal-content">
        <h3 id="modal-titulo">Personalizar</h3>
        <div class="modal-secao" id="area-vinagrete"><h4>🍅 Vinagrete (Grátis)</h4><div id="secao-vinagrete"></div></div>
        <div class="modal-secao"><h4>🧀 Complementos</h4><div id="secao-complementos"></div></div>
        <div class="modal-secao"><h4>🥤 Bebidas</h4><div id="secao-bebidas"></div></div>
        <div class="modal-secao"><h4>📝 Observação</h4><textarea id="obs-item" class="obs-box" placeholder="Ex: tirar cebola..."></textarea></div>
        <div style="display:flex; gap:10px;"><button class="btn-modal btn-voltar-modal" onclick="fecharModal()">Voltar</button><button class="btn-modal btn-confirmar-modal" onclick="confirmarAdicao()">Adicionar</button></div>
    </div>
</div>

<div id="checkout">
    <button class="btn-modal btn-voltar-modal" style="width:100%; margin-bottom:20px;" onclick="fecharCheckout()">⬅ Continuar Comprando</button>
    <h2>Finalizar Pedido</h2>
    <div id="resumo" style="background:#f9f9f9; padding:15px; border-radius:12px; margin: 15px 0; border: 1px solid #eee;"></div>
    <input type="text" id="nome" class="input-estilizado" placeholder="Seu Nome">
    <input type="text" id="endereco" class="input-estilizado" placeholder="Endereço Completo">
    <select id="pagamento" class="input-estilizado" onchange="verificarTroco()"><option value="PIX">PIX</option><option value="Cartão">Cartão</option><option value="Dinheiro">Dinheiro</option></select>
    <div id="area-troco"><label>Troco para quanto?</label><input type="number" id="valor-recebido" class="input-estilizado" oninput="calcularTroco()"><p id="info-troco" style="font-weight:bold; color:green;"></p></div>
    <button class="btn-modal btn-confirmar-modal" style="width: 100%; font-size: 18px;" onclick="enviarWhatsApp()">🚀 Finalizar no WhatsApp</button>
</div>

<script>
    const produtos = [
        { id: 1, cat: 'cuscuz', nome: "Cuscuz Carne Seca", preco: 18.0 },
        { id: 2, cat: 'cuscuz', nome: "Cuscuz de Frango", preco: 15.0 },
        { id: 3, cat: 'tapioca', nome: "Tapioca de Queijo", preco: 12.0 },
        { id: 4, cat: 'tapioca', nome: "Tapioca Cartola", preco: 14.0 }
    ];
    const vinagreteOpc = [{ nome: "Vinagrete", preco: 0.0 }];
    const complementosOpc = [{ nome: "Ovo Frito", preco: 3.0 }, { nome: "Queijo Coalho", preco: 4.5 }];
    const bebidasOpc = [{ nome: "Café 300ml", preco: 5.0 }, { nome: "Suco Natural", preco: 8.0 }];
    let carrinho = []; let itemAtual = null;

    function renderizar() {
        ['cuscuz', 'tapioca'].forEach(cat => {
            document.getElementById('lista-' + cat).innerHTML = produtos.filter(p => p.cat === cat).map(p => `
                <div class="item-card" onclick="abrirModal(${p.id})">
                    <div><strong>${p.nome}</strong><br><span class="price">R$ ${p.preco.toFixed(2).replace('.',',')}</span></div>
                    <button style="background:var(--primary); color:white; border:none; width:30px; height:30px; border-radius:50%;">+</button>
                </div>`).join('');
        });
    }
    function abrirModal(id) {
        itemAtual = produtos.find(p => p.id === id);
        document.getElementById('modal-titulo').innerText = itemAtual.nome;
        document.getElementById('area-vinagrete').style.display = itemAtual.cat === 'cuscuz' ? 'block' : 'none';
        const gerar = (l) => l.map(o => `<div class="opcao-item"><label><input type="checkbox" data-preco="${o.preco}" data-nome="${o.nome}" class="chk-extra"> ${o.nome}</label><span>+R$ ${o.preco.toFixed(2)}</span></div>`).join('');
        document.getElementById('secao-vinagrete').innerHTML = gerar(vinagreteOpc);
        document.getElementById('secao-complementos').innerHTML = gerar(complementosOpc);
        document.getElementById('secao-bebidas').innerHTML = gerar(bebidasOpc);
        document.getElementById('modal-opcionais').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('modal-opcionais').style.display = 'none'; }
    function confirmarAdicao() {
        const extras = []; let vExtras = 0;
        document.querySelectorAll('.chk-extra:checked').forEach(c => { extras.push(c.dataset.nome); vExtras += parseFloat(c.dataset.preco); });
        carrinho.push({ nome: itemAtual.nome, total: itemAtual.preco + vExtras, detalhes: extras.join(', '), obs: document.getElementById('obs-item').value });
        fecharModal(); atualizarTotal();
    }
    function atualizarTotal() { const t = carrinho.reduce((s, i) => s + i.total, 0); document.getElementById('total-txt').innerText = `R$ ${t.toFixed(2).replace('.', ',')}`; }
    function verificarTroco() { document.getElementById('area-troco').style.display = (document.getElementById('pagamento').value === 'Dinheiro') ? 'block' : 'none'; }
    function calcularTroco() {
        const t = carrinho.reduce((s, i) => s + i.total, 0); const r = parseFloat(document.getElementById('valor-recebido').value) || 0;
        document.getElementById('info-troco').innerText = r > t ? `Troco: R$ ${(r - t).toFixed(2)}` : "";
    }
    function abrirCheckout() {
        if(carrinho.length === 0) return alert("Carrinho vazio!");
        document.getElementById('resumo').innerHTML = carrinho.map(i => `<div><strong>${i.nome}</strong> - R$ ${i.total.toFixed(2)}<br><small>${i.detalhes} ${i.obs ? '| '+i.obs : ''}</small></div>`).join('');
        document.getElementById('checkout').style.display = 'block';
    }
    function fecharCheckout() { document.getElementById('checkout').style.display = 'none'; }

    function enviarWhatsApp() {
        const n = document.getElementById('nome').value; const e = document.getElementById('endereco').value;
        const p = document.getElementById('pagamento').value; const t = carrinho.reduce((s, i) => s + i.total, 0);
        const r = parseFloat(document.getElementById('valor-recebido').value) || 0;
        if(!n || !e) return alert("Preencha os campos!");

        let m = `*NOVO PEDIDO*\nCliente: ${n}\nEndereço: ${e}\n\n`;
        carrinho.forEach(i => m += `✅ ${i.nome} - R$ ${i.total.toFixed(2)}\n${i.detalhes ? ' + '+i.detalhes+'\n' : ''}${i.obs ? ' Obs: '+i.obs+'\n' : ''}\n`);
        m += `TOTAL: R$ ${t.toFixed(2)}\nPagamento: ${p}`;
        if(p === 'Dinheiro' && r > t) m += `\nTroco para R$ ${r.toFixed(2)} (Levar R$ ${(r-t).toFixed(2)})`;

        // AJUSTE FINAL: Link universal wa.me
        const url = `https://wa.me{encodeURIComponent(m)}`;
        window.location.assign(url);
    }
    renderizar();
</script>
</body>
</html>
